<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Foro Enduro Nalón</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/chat.css">
</head>

<body>
    <div style="text-align:center; margin-bottom:20px;">
        <button class="operator" onclick="location.href='index.html'">🏠 Home</button>
    </div>

    <div class="container">

        <div class="temas">
            <h3>Temas</h3>

            <div id="error"></div>

            <input id="nuevoTemaTitulo" placeholder="Título del tema">
            <textarea id="nuevoTemaDesc" placeholder="Descripción"></textarea>
            <button onclick="crearTema()">Crear tema</button>

            <hr>

            <div id="listaTemas"></div>
        </div>

        <div class="chat">
            <h3 id="tituloTema" style="padding: 15px; margin: 0; color: white;">Selecciona un tema</h3>

            <div class="mensajes" id="mensajes"></div>

            <div class="input">
                <input id="mensajeInput" placeholder="Escribe un mensaje..."
                    onkeydown="if(event.key==='Enter') enviarMensaje()">
                <button onclick="enviarMensaje()">Enviar</button>
            </div>
        </div>

    </div>

    <script>
        const API = "/.netlify/functions";
        let temaActual = null;

        function showError(msg) {
            document.getElementById("error").innerText = msg;
        }

        function checkLogin() {
            if (!isLogged()) {
                openAuthModal();
                showError("Debes iniciar sesión para usar el foro");
            }
        }

        async function cargarTemas() {
            if (!isLogged()) return;

            try {
                const res = await fetch(`${API}/getTemas`, {
                    headers: { Authorization: "Bearer " + getToken() }
                });

                const data = await res.json();

                if (!Array.isArray(data)) {
                    showError(data.error || "Error cargando temas");
                    return;
                }

                const cont = document.getElementById("listaTemas");
                cont.innerHTML = "";

                data.forEach(t => {
                    const div = document.createElement("div");
                    div.className = "tema";
                    div.innerHTML = `<b>${t.titulo}</b><br>${t.descripcion || ""}`;
                    div.onclick = () => seleccionarTema(t);
                    cont.appendChild(div);
                });

            } catch (err) {
                showError("Error de conexión con el servidor");
            }
        }

        async function crearTema() {
            if (!isLogged()) {
                openAuthModal();
                return;
            }

            const titulo = document.getElementById("nuevoTemaTitulo").value;
            const descripcion = document.getElementById("nuevoTemaDesc").value;

            const res = await fetch(`${API}/createTema`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + getToken()
                },
                body: JSON.stringify({ titulo, descripcion })
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.error || "Error creando tema");
                return;
            }

            document.getElementById("nuevoTemaTitulo").value = "";
            document.getElementById("nuevoTemaDesc").value = "";

            cargarTemas();
        }

        function seleccionarTema(t) {
            temaActual = t.id;
            document.getElementById("tituloTema").innerText = t.titulo;
            cargarMensajes();
        }

        async function cargarMensajes() {
            if (!temaActual || !isLogged()) return;

            const res = await fetch(`${API}/getMensajes?tema_id=${temaActual}`, {
                headers: { Authorization: "Bearer " + getToken() }
            });

            const data = await res.json();

            if (!Array.isArray(data)) {
                showError(data.error || "Error cargando mensajes");
                return;
            }

            const cont = document.getElementById("mensajes");
            cont.innerHTML = "";

            data.forEach(m => {
                const div = document.createElement("div");
                div.className = "mensaje";

                const user = m.usuario || getUser() || "Anónimo";

                let fechaTexto = "";

                if (m.fecha) {
                    const fecha = new Date(m.fecha);

                    const hora = fecha.toLocaleTimeString("es-ES", {
                        hour: "2-digit",
                        minute: "2-digit"
                    });

                    const dia = fecha.getDate();
                    const mes = fecha.getMonth() + 1;
                    const anio = fecha.getFullYear();

                    fechaTexto = `${hora} ${dia}/${mes}/${anio}`;
                }

                div.innerHTML = `
        <b>${user}</b><br>
        ${m.contenido}
        <div class="mensaje-fecha">${fechaTexto}</div>
    `;

                cont.appendChild(div);
            });

            cont.scrollTop = cont.scrollHeight;
        }

        async function enviarMensaje() {
            if (!isLogged()) {
                openAuthModal();
                return;
            }

            if (!temaActual) {
                alert("Selecciona un tema primero");
                return;
            }

            const input = document.getElementById("mensajeInput");

            if (!input.value.trim()) return;

            const res = await fetch(`${API}/addMensaje`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + getToken()
                },
                body: JSON.stringify({
                    contenido: input.value,
                    tema_id: temaActual
                })
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.error || "Error enviando mensaje");
                return;
            }

            input.value = "";
            cargarMensajes();
        }

        window.onAuthReady = function () {
            checkLogin();
            cargarTemas();
        };

        window.onLoginSuccess = function () {
            cargarTemas();
            showError("");
        };

        window.onLogout = function () {
            location.reload();
        };
    </script>

    <script>
        window.PROD_URL = "https://enduronalon.netlify.app";
    </script>
    <script src="js/auth.js"></script>
    <script src="js/legal.js"></script>
    <script src="js/cookies.js"></script>
</body>

</html>
