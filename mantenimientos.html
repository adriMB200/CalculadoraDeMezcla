<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Motos y Mantenimientos</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/chat.css">
</head>

<body>

    <div style="display:flex; justify-content:center; gap:15px; margin-bottom:20px;">
        <button class="operator" onclick="location.href='index.html'">🏠 Home</button>
    </div>

    <div class="info-container">
        <h2>📘 Mis Motos y Mantenimientos</h2>

        <form id="motoForm">
            <label>Marca:</label>
            <select id="marca" required onchange="actualizarModelos()">
                <option value="">Selecciona una marca</option>
                <option value="KTM">KTM</option>
                <option value="GasGas">GasGas</option>
                <option value="Rieju">Rieju</option>
                <option value="BMW">BMW</option>
            </select>

            <label>Modelo:</label>
            <select id="modelo" required>
                <option value="">Selecciona un modelo</option>
            </select>

            <label>Año:</label>
            <select id="anio" required>
                <option value="">Selecciona un año</option>
            </select>

            <button type="submit">➕ Añadir Moto</button>
        </form>

        <div id="motoList"></div>
    </div>

    <script>
        const PROD_URL = "https://enduronalon.netlify.app";

        function getEndpoint(path) {
            if (window.location.protocol.startsWith('http')) {
                return path;
            }
            return `${PROD_URL}${path}`;
        }

        const modelosPorMarca = {
            "KTM": ["EXC 250", "EXC 300", "EXC-F 450"],
            "GasGas": ["EC 200", "EC 250", "EC 300"],
            "Rieju": ["MR 300"],
            "BMW": ["Funduro 650"]
        };

        const selectAnio = document.getElementById("anio");
        for (let i = 2025; i >= 1980; i--) {
            const option = document.createElement("option");
            option.value = i;
            option.textContent = i;
            selectAnio.appendChild(option);
        }

        function actualizarModelos() {
            const marcaSeleccionada = document.getElementById("marca").value;
            const selectModelo = document.getElementById("modelo");
            selectModelo.innerHTML = "<option value=''>Selecciona un modelo</option>";

            if (modelosPorMarca[marcaSeleccionada]) {
                for (let i = 0; i < modelosPorMarca[marcaSeleccionada].length; i++) {
                    const modelo = modelosPorMarca[marcaSeleccionada][i];
                    const option = document.createElement("option");
                    option.value = modelo;
                    option.textContent = modelo;
                    selectModelo.appendChild(option);
                }
            }
        }

        async function eliminarMantenimiento(id) {
            if (!confirm("¿Seguro que quieres eliminar este mantenimiento?")) return;

            try {
                const res = await fetch(getEndpoint("/.netlify/functions/deleteMantenimiento"), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ id })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Error al eliminar mantenimiento");

                alert(data.message);
                renderMotos();
            } catch (err) {
                alert(err.message);
            }
        }

        const motoList = document.getElementById("motoList");

        async function renderMotos() {
            if (!isLogged()) {
                motoList.innerHTML = "<p>Debes iniciar sesión para ver tus motos.</p>";
                return;
            }

            motoList.innerHTML = "<p>Cargando motos...</p>";

            try {
                const res = await fetch(getEndpoint("/.netlify/functions/getMotos"), {
                    headers: { Authorization: `Bearer ${getToken()}` }
                });

                if (!res.ok) throw new Error("Error cargando motos");

                const motos = await res.json();

                if (motos.length === 0) {
                    motoList.innerHTML = "<p>No hay motos registradas.</p>";
                    return;
                }

                motoList.innerHTML = "";

                for (let i = 0; i < motos.length; i++) {
                    const moto = motos[i];
                    const div = document.createElement("div");
                    div.classList.add("moto-card");

                    let mantenimientosHtml = "";

                    if (moto.mantenimientos && moto.mantenimientos.length > 0) {
                        for (let j = 0; j < moto.mantenimientos.length; j++) {
                            const m = moto.mantenimientos[j];
                            let fechaStr = "";

                            if (m.fecha) {
                                const fecha = new Date(m.fecha);
                                fechaStr = fecha.toLocaleDateString("es-ES", {
                                    day: "2-digit",
                                    month: "2-digit",
                                    year: "numeric"
                                });
                            }

                            mantenimientosHtml += `
                                <li>
                                    📅 ${fechaStr} — 🕒 ${m.horas} h — ${m.descripcion}
                                    <button onclick="eliminarMantenimiento(${m.id})" style="margin-left:10px;">❌</button>
                                </li>
                            `;
                        }
                    }

                    div.innerHTML = `
                        <h3>🏍️ ${moto.marca} ${moto.modelo} (${moto.anio}) — Mat: ${moto.matricula}</h3>
                        <button onclick="agregarMantenimiento('${moto.matricula}')">🛠️ Añadir mantenimiento</button>
                        <ul>${mantenimientosHtml}</ul>
                    `;

                    motoList.appendChild(div);
                }

            } catch (err) {
                motoList.innerHTML = "<p>Error cargando motos</p>";
                console.error(err);
            }
        }

        const motoForm = document.getElementById("motoForm");
        motoForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            if (!isLogged()) {
                openAuthModal();
                return;
            }

            const marca = document.getElementById("marca").value;
            const modelo = document.getElementById("modelo").value;
            const anio = parseInt(document.getElementById("anio").value);
            const matricula = prompt("Introduce la matrícula de la moto (ej: 1234ABC)");

            if (!matricula) return alert("Debes introducir una matrícula");

            try {
                const res = await fetch(getEndpoint("/.netlify/functions/addMoto"), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ matricula, marca, modelo, anio })
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Error");

                alert(data.message || "Moto añadida");
                renderMotos();
                motoForm.reset();
            } catch (err) {
                alert(err.message);
            }
        });

        async function agregarMantenimiento(matricula) {
            if (!isLogged()) {
                openAuthModal();
                return;
            }

            const descripcion = prompt("Descripción del mantenimiento");
            if (!descripcion) return;

            const horas = prompt("Horas del motor");
            if (!horas || isNaN(horas)) return alert("Introduce horas válidas");

            try {
                const res = await fetch(getEndpoint("/.netlify/functions/addMantenimiento"), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ matricula, descripcion, horas: Number(horas) })
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Error");

                alert(data.message || "Mantenimiento añadido");
                renderMotos();
            } catch (err) {
                alert(err.message);
            }
        }

        window.onAuthReady = function () {
            renderMotos();
        };

        window.onLoginSuccess = function () {
            renderMotos();
        };

        window.onLogout = function () {
            renderMotos();
        };
    </script>

    <script src="/js/chatbot.js"></script>
    <script>
        window.PROD_URL = "https://enduronalon.netlify.app";

        window.getEndpoint = function (path) {
            if (!path.startsWith("/")) {
                path = "/" + path;
            }

            if (window.location.protocol === "http:" || window.location.protocol === "https:") {
                return path;
            }

            return window.PROD_URL.replace(/\/$/, "") + path;
        };
    </script>
    <script>
        window.PROD_URL = "https://enduronalon.netlify.app";
    </script>
    <script src="js/auth.js"></script>

    <footer>
        <p>© <span id="year"></span> Enduronalon. Todos los derechos reservados.</p>
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>

</html>
