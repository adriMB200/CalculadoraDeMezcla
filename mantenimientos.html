<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagen/img.jpg" />
    <title>Gestor de Motos y Mantenimientos</title>
    <link rel="stylesheet" href="estilo.css">

    <script>
        window.netlify = window.netlify || {};
        window.netlify.disableRUM = true;
    </script>

</head>

<body>

    <div style="text-align:center; margin: 20px 0;">
        <button onclick="window.location.href='index.html'" class="operator">🏠 Volver al inicio</button>
    </div>

    <div class="info-container">

        <h2>📘 Mis Motos y Mantenimientos</h2>

        <form id="motoForm" style="margin-bottom: 20px;">

            <label for="marca"><strong>Marca:</strong></label>
            <select id="marca" required onchange="actualizarModelos()">
                <option value="">Selecciona una marca</option>
                <option value="KTM">KTM</option>
                <option value="GasGas">GasGas</option>
                <option value="Rieju">Rieju</option>
                <option value="BMW">BMW</option>
            </select>

            <label for="modelo"><strong>Modelo:</strong></label>
            <select id="modelo" required>
                <option value="">Selecciona un modelo</option>
            </select>

            <label for="anio"><strong>Año:</strong></label>
            <select id="anio" required>
                <option value="">Selecciona un año</option>
            </select>

            <button type="submit" class="operator">➕ Añadir Moto</button>

        </form>

        <div id="motoList"></div>

    </div>

    <script>

        const modelosPorMarca = {
            "KTM": ["EXC 250", "EXC 300", "EXC-F 450"],
            "GasGas": ["EC 200", "EC 250", "EC 300"],
            "Rieju": ["MR 300"],
            "BMW": ["Funduro 650"]
        };

        const selectAnio = document.getElementById("anio");

        for (let i = 2025; i >= 1980; i--) {
            const option = document.createElement("option");
            option.value = i;
            option.textContent = i;
            selectAnio.appendChild(option);
        }

        function actualizarModelos() {

            const marcaSeleccionada = document.getElementById("marca").value;
            const selectModelo = document.getElementById("modelo");

            selectModelo.innerHTML = "<option value=''>Selecciona un modelo</option>";

            if (modelosPorMarca[marcaSeleccionada]) {

                modelosPorMarca[marcaSeleccionada].forEach(modelo => {

                    const option = document.createElement("option");

                    option.value = modelo;
                    option.textContent = modelo;

                    selectModelo.appendChild(option);

                });

            }

        }

        const motoForm = document.getElementById("motoForm");
        const motoList = document.getElementById("motoList");

        async function renderMotos() {

            motoList.innerHTML = "<p>Cargando motos...</p>";

            try {

                const res = await fetch("/.netlify/functions/getMotos");

                const motos = await res.json();

                if (motos.length === 0) {

                    motoList.innerHTML = "<p>No hay motos registradas.</p>";
                    return;

                }

                motoList.innerHTML = "";

                motos.forEach(moto => {

                    const div = document.createElement("div");

                    div.classList.add("moto-card");

                    const mantenimientosHtml = (moto.mantenimientos || [])
                        .map(m => `<li>📅 ${m.fecha} — 🕒 ${m.horas} h — ${m.descripcion}</li>`)
                        .join("");

                    div.innerHTML = `
<h3>🏍️ ${moto.marca} ${moto.modelo} (${moto.anio}) — Mat: ${moto.matricula}</h3>

<button onclick="agregarMantenimiento('${moto.matricula}')" class="operator">
🛠️ Añadir mantenimiento
</button>

<ul>${mantenimientosHtml}</ul>
`;

                    motoList.appendChild(div);

                });

            } catch (err) {

                motoList.innerHTML = "<p>Error cargando motos</p>";

            }

        }

        motoForm.addEventListener("submit", async (e) => {

            e.preventDefault();

            const marca = document.getElementById("marca").value;
            const modelo = document.getElementById("modelo").value;
            const anio = parseInt(document.getElementById("anio").value);

            const matricula = prompt("Introduce la matrícula de la moto (ej: 1234ABC)");

            if (!matricula) return alert("Debes introducir una matrícula");

            try {

                const res = await fetch("/.netlify/functions/addMoto", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        matricula,
                        marca,
                        modelo,
                        anio
                    })

                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Error");

                alert(data.message || "Moto añadida");

                renderMotos();

                motoForm.reset();

            } catch (err) {

                alert("Error al registrar moto: " + err.message);

            }

        });

        async function agregarMantenimiento(matricula) {

            const descripcion = prompt("Descripción del mantenimiento");

            if (!descripcion) return;

            const horas = prompt("Horas del motor");

            if (!horas || isNaN(horas)) {

                alert("Introduce horas válidas");
                return;

            }

            try {

                const res = await fetch("/.netlify/functions/addMantenimiento", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        matricula,
                        descripcion,
                        horas: Number(horas)
                    })

                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Error");

                alert(data.message || "Mantenimiento añadido");

                renderMotos();

            } catch (err) {

                alert("Error al registrar mantenimiento: " + err.message);

            }

        }

        renderMotos();

    </script>

    <script src="/js/chatbot.js"></script>

</body>

</html>
